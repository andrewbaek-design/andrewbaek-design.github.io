# Netlify deploy config
#
# The site is published from the project root as plain static HTML.
# There's no Netlify build step — the build is done locally by
# build.py before each deploy:
#
#     python3 build.py
#     netlify deploy --prod --dir=.
#
# A future "connect to GitHub for auto-deploy" flow would change
# `command` below to run `python3 build.py`. Left commented for now
# so manual deploys don't accidentally rebuild on Netlify's servers.

[build]
  publish = "."
  # command = "python3 build.py"

[build.environment]
  PYTHON_VERSION = "3.11"

# Strip the default Netlify branding (loud header banner) from the
# served HTML — we render our own brand chrome.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets aggressively; HTML is fresh-on-every-request.
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"
