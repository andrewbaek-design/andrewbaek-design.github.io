name: Build and deploy to GitHub Pages

# Runs on every push to main. Also exposed as a manual trigger so it
# can be re-run from the Actions tab without pushing a new commit.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Pages deploy needs id-token + pages write. Read-only for everything else.
permissions:
  contents: read
  pages: write
  id-token: write

# Serialize so a fast-follow push doesn't race the previous deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: astro
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: astro/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./astro/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
